<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, height=675">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
      colors: {
        sell: '#dc2626',
        'sell-soft': '#fef2f2',
        buy: '#059669',
        'buy-soft': '#ecfdf5',
        ink: '#0f172a',
        subtle: '#64748b',
        muted: '#94a3b8',
        surface: '#f8fafc',
        card: '#ffffff',
        divider: '#e2e8f0',
        brand: '#0EA882',
      }
    }
  }
}
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px; height: 675px; overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
</style>
</head>
<body class="bg-white text-ink">
<script>/*__DATA__*/</script>

<div class="flex flex-col h-[675px] px-10 py-7">

  <!-- Header: Logo+Name left | Title+Date right -->
  <div class="flex items-center justify-between mb-7">
    <div class="flex items-center gap-3">
      <div class="relative w-[52px] h-[52px] flex items-center justify-center">
        <div class="absolute inset-0 rounded-2xl bg-brand/15"></div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="28" height="28" class="relative z-10">
          <rect x="12" y="12" width="76" height="76" rx="22" fill="none" stroke="#0EA882" stroke-width="10"/>
          <path d="M 30 66 L 45 46 L 55 54 L 70 34" fill="none" stroke="#0EA882" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="30" cy="66" r="7.5" fill="#0EA882"/><circle cx="70" cy="34" r="7.5" fill="#0EA882"/>
        </svg>
      </div>
      <div>
        <div class="text-[22px] font-extrabold tracking-tight leading-none">Tapetide</div>
        <div class="text-[11px] font-semibold text-muted tracking-wide mt-0.5">Stock Research Platform</div>
      </div>
    </div>
    <div class="text-right">
      <div class="text-[20px] font-extrabold tracking-tight leading-none">FII DII Daily Update</div>
      <div class="text-[13px] font-medium text-subtle mt-1" id="fullDate"></div>
    </div>
  </div>

  <!-- Hero: FII | Combined | DII -->
  <div class="grid grid-cols-12 gap-6 mb-5">
    <!-- FII -->
    <div class="col-span-5">
      <div class="flex items-center gap-2 mb-2">
        <div class="w-3 h-3 rounded-full bg-sell"></div>
        <span class="text-[16px] font-extrabold text-ink uppercase tracking-wide">FII / FPI</span>
      </div>
      <div class="text-[54px] font-black tracking-tighter leading-none" id="fiiNet"></div>
      <div class="flex items-center gap-5 mt-3 text-subtle">
        <div class="flex items-center gap-1">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>
          <span class="text-[14px] font-semibold" id="fiiBuy"></span>
        </div>
        <div class="flex items-center gap-1">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
          <span class="text-[14px] font-semibold" id="fiiSell"></span>
        </div>
      </div>
    </div>
    <!-- Combined -->
    <div class="col-span-2 flex flex-col items-center justify-center">
      <span class="text-[12px] font-bold text-ink uppercase tracking-widest mb-2">Net Combined</span>
      <span class="text-[30px] font-black tracking-tight leading-none" id="combined"></span>
    </div>
    <!-- DII -->
    <div class="col-span-5 text-right">
      <div class="flex items-center gap-2 mb-2 justify-end">
        <span class="text-[16px] font-extrabold text-ink uppercase tracking-wide">DII</span>
        <div class="w-3 h-3 rounded-full bg-buy"></div>
      </div>
      <div class="text-[54px] font-black tracking-tighter leading-none" id="diiNet"></div>
      <div class="flex items-center gap-5 mt-3 justify-end text-subtle">
        <div class="flex items-center gap-1">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>
          <span class="text-[14px] font-semibold" id="diiBuy"></span>
        </div>
        <div class="flex items-center gap-1">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
          <span class="text-[14px] font-semibold" id="diiSell"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Market Split Bar -->
  <div class="mb-5">
    <div class="flex justify-between mb-2">
      <span class="text-[14px] font-extrabold text-sell uppercase" id="fiiPctLabel"></span>
      <span class="text-[14px] font-extrabold text-buy uppercase" id="diiPctLabel"></span>
    </div>
    <div class="w-full flex h-4 rounded-full overflow-hidden">
      <div class="h-full bg-sell rounded-l-full" id="barFii"></div>
      <div class="h-full bg-buy rounded-r-full" id="barDii"></div>
    </div>
  </div>

  <!-- Bottom 2x2 Grid with Icons -->
  <div class="grid grid-cols-2 gap-4 flex-1">

    <!-- FII Streak -->
    <div class="bg-surface rounded-2xl border border-divider flex items-center gap-4 px-5 py-3">
      <div class="w-12 h-12 rounded-xl flex items-center justify-center shrink-0" id="fiiStreakIcon">
        <!-- Arrow icon injected by JS -->
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-[12px] font-bold text-ink uppercase tracking-wide">FII Streak</div>
        <div class="text-[20px] font-extrabold leading-tight mt-0.5" id="fiiStreakVal"></div>
      </div>
      <div class="text-right shrink-0">
        <div class="text-[12px] font-bold text-ink uppercase tracking-wide">Streak Total</div>
        <div class="text-[18px] font-extrabold leading-tight mt-0.5" id="fiiStreakTotal"></div>
      </div>
    </div>

    <!-- DII Streak -->
    <div class="bg-surface rounded-2xl border border-divider flex items-center gap-4 px-5 py-3">
      <div class="w-12 h-12 rounded-xl flex items-center justify-center shrink-0" id="diiStreakIcon">
        <!-- Arrow icon injected by JS -->
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-[12px] font-bold text-ink uppercase tracking-wide">DII Streak</div>
        <div class="text-[20px] font-extrabold leading-tight mt-0.5" id="diiStreakVal"></div>
      </div>
      <div class="text-right shrink-0">
        <div class="text-[12px] font-bold text-ink uppercase tracking-wide">Streak Total</div>
        <div class="text-[18px] font-extrabold leading-tight mt-0.5" id="diiStreakTotal"></div>
      </div>
    </div>

    <!-- FII Index Futures L/S -->
    <div class="bg-surface rounded-2xl border border-divider flex items-center gap-4 px-5 py-3">
      <div class="w-12 h-12 rounded-xl flex items-center justify-center shrink-0" id="faoIcon">
        <!-- Arrow icon injected by JS -->
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-[12px] font-bold text-ink uppercase tracking-wide">FII Idx Futures L/S</div>
        <div class="flex items-baseline gap-2 mt-0.5">
          <span class="text-[22px] font-black leading-tight" id="faoLongPct"></span>
          <span class="text-[12px] font-bold" id="faoSentiment"></span>
        </div>
      </div>
      <div class="w-24 shrink-0">
        <div class="w-full flex h-2.5 rounded-full overflow-hidden">
          <div class="h-full bg-buy rounded-l-full" id="faoBarLong"></div>
          <div class="h-full bg-sell rounded-r-full" id="faoBarShort"></div>
        </div>
        <div class="flex justify-between mt-1">
          <span class="text-[9px] font-bold text-buy">Long</span>
          <span class="text-[9px] font-bold text-sell">Short</span>
        </div>
      </div>
    </div>

    <!-- 30-Day Flows -->
    <div class="bg-surface rounded-2xl border border-divider flex items-center gap-4 px-5 py-3">
      <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-sell-soft to-buy-soft flex items-center justify-center shrink-0">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-[12px] font-bold text-ink uppercase tracking-wide">30-Day Net Flows</div>
        <div class="flex gap-5 mt-1">
          <div>
            <span class="text-[11px] font-bold text-subtle">FII </span>
            <span class="text-[16px] font-extrabold" id="fii30d"></span>
          </div>
          <div>
            <span class="text-[11px] font-bold text-subtle">DII </span>
            <span class="text-[16px] font-extrabold" id="dii30d"></span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="flex items-center justify-between mt-3">
    <span class="text-[11px] font-semibold text-brand">tapetide.com/fii-dii-data</span>
    <div class="flex items-center gap-1.5 text-subtle">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" class="shrink-0"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      <span class="text-[11px] font-semibold leading-none">@tapetide_hq</span>
    </div>
  </div>

</div>

<script>/*__SHARED__*/</script>
<script>renderData(DATA, 24);</script>
</body>
</html>
